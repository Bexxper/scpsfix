<!DOCTYPE html>
<html
    lang="en"
    style="background-color: rgba(0, 0, 0, 0); width: 100%; height: 100%"
>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Growtopia Player Support</title>

    <link rel="stylesheet"
        href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/faq-main.css" />
    <link rel="stylesheet"
        href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/shop-custom.css" />
    <link rel="stylesheet"
        href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/ingame-custom.css" />
</head>

<body style="background-color: rgba(0, 0, 0, 0)">

<button type="button" id="modalButton"
        data-toggle="modal"
        data-target="#modalShow"></button>

<div class="modal fade" id="modalShow">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-body">

<h2 style="text-align:center;">Log Into Your GTPSID</h2>

<!-- LOGIN -->
<form method="POST" action="/player/growid/login/validate">
<input type="hidden" name="_token" value="{{ data }}" />

<input class="form-control"
       name="growId"
       placeholder="Your GrowID Name" />

<input class="form-control"
       name="password"
       type="password"
       placeholder="Your GrowID Password" />

<br>

<input class="btn btn-primary" type="submit" value="Login"/>
</form>

<br>

<!-- REGISTER BUTTON (AJAX) -->
<button id="registerBtn"
        class="btn btn-primary"
        type="button">
    Don't have any GTPSID? Register here!
</button>

</div>
</div>
</div>
</div>

<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/jquery/jquery-2.1.4.min.js"></script>
<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/bootstrap/javascripts/bootstrap.min.js"></script>

<script>
// open modal
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('modalButton').click();
});

// REGISTER AJAX
document.getElementById('registerBtn').addEventListener('click', async () => {
    try {
        const res = await fetch('/player/growid/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: '_token={{ data }}&growId=new_user&password=new_pass'
        });

        const data = await res.json();

        alert(data.message); // bisa diganti UI nanti

    } catch (err) {
        alert('Register failed');
    }
});
</script>

</body>
</html>
<button
    type="button"
    class="btn btn-primary hidden"
    data-toggle="modal"
    id="modalButton"
    data-target="#modalShow"
    data-backdrop="static"
    data-keyboard="false"
></button>

<div class="content">
<section class="common-box">
<div class="container">
<div class="row">
<div class="col-md-12 col-sm-12">
<div class="row">

<div class="modal fade product-list-popup"
     id="modalShow"
     tabindex="-1"
     role="dialog">

<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-body">

<div class="content">
<section class="common-box">
<div class="container">

<div class="section-title center-align">
<h2>Log Into Your GTPSID</h2>
</div>

<div class="row div-content-center">
<div class="col-md-12 col-sm-12">

<!-- LOGIN -->
<form method="POST"
      action="/player/growid/login/validate"
      autocomplete="off">

<input name="_token" type="hidden" value="{{ data }}" />

<div class="form-group">
<input class="form-control grow-text"
       placeholder="Your GrowID Name *"
       name="growId"
       type="text" />
</div>

<div class="form-group">
<input class="form-control grow-text"
       placeholder="Your GrowID Password *"
       name="password"
       type="password" />
</div>

<div class="form-group text-center">
<input class="btn btn-lg btn-primary grow-button"
       type="submit"
       value="Login" />
</div>

</form>

<!-- REGISTER (FIXED) -->
<form method="POST"
      action="/player/growid/register">

<input name="_token" type="hidden" value="{{ data }}" />

<!-- default value supaya tidak kosong -->
<input name="growId" type="hidden" value="new_user" />
<input name="password" type="hidden" value="new_pass" />

<div class="form-group text-center">
<input class="btn btn-lg btn-primary grow-button"
       type="submit"
       value="Don't have any GTPSID? Register here!" />
</div>

</form>

</div>
</div>

</div>
</section>
</div>

</div>
</div>
</div>
</div>

</div>
</div>
</div>
</section>
</div>

<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/jquery/jquery-2.1.4.min.js"></script>
<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/bootstrap/javascripts/bootstrap.min.js"></script>

<script>
let clicked = false;

$('a').click(function () {
    if (!clicked) {
        clicked = true;
        return true;
    }
    $(this).attr('onclick', 'return false;');
});

$(document).ready(function () {

    document.onkeydown = e => {
        if (e.key == 123 || e.key == 'F12') e.preventDefault();
        if (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(e.key)) e.preventDefault();
        if (e.ctrlKey && e.key == 'U') e.preventDefault();
    };

    $('#modalButton').trigger('click');

});
</script>

</body>
</html>
