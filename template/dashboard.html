<!DOCTYPE html>
<html lang="en" style="background-color: rgba(0,0,0,0); width:100%; height:100%">
<head>
    <meta charset="utf-8">
    <title>Growtopia Player Support</title>

    <link rel="icon" href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico">

    <link rel="stylesheet" href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/faq-main.css">
    <link rel="stylesheet" href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/shop-custom.css">
    <link rel="stylesheet" href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/ingame-custom.css">

    <style>
        .modal-backdrop {
            background-color: rgba(0,0,0,0.1);
        }
    </style>
</head>

<body style="background-color: transparent">

<!-- hidden trigger -->
<button id="modalButton" data-toggle="modal" data-target="#modalShow" style="display:none;"></button>

<div class="modal fade" id="modalShow">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-body">

                <h3 style="text-align:center;">Log Into Your GTPSID</h3>

                <!-- LOGIN FORM -->
                <form id="loginForm" method="POST" action="/player/growid/login/validate">

                    <input type="hidden" name="_token" value="<%= data %>">

                    <div class="form-group">
                        <input id="loginGrowId" name="growId" class="form-control" placeholder="Your GrowID Name">
                    </div>

                    <div class="form-group">
                        <input id="loginPassword" name="password" type="password" class="form-control" placeholder="Your GrowID Password">
                    </div>

                    <div style="text-align:center;">
                        <button id="loginButton" class="btn btn-primary">Login</button>
                    </div>

                </form>

                <br>

                <!-- REGISTER FORM (FIXED) -->
                <form id="registerForm" method="POST" action="/player/growid/login/validate">
                    <input type="hidden" name="_token" value="<%= data %>">
                    <input type="hidden" name="reg" value="1">

                    <!-- hidden fields diisi via JS -->
                    <input type="hidden" name="growId" id="regGrowId">
                    <input type="hidden" name="password" id="regPassword">

                    <div style="text-align:center;">
                        <button id="registerButton" class="btn btn-secondary">
                            Don't have any GTPSID? Register here!
                        </button>
                    </div>
                </form>

                <!-- ERROR -->
                <div id="errorDiv" style="display:none; color:red; text-align:center;">
                    <span id="errorMessage"></span>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/jquery/jquery-2.1.4.min.js"></script>
<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/bootstrap/javascripts/bootstrap.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // buka modal otomatis
    document.getElementById('modalButton').click();

    // load saved username
    if (localStorage.getItem('growId')) {
        document.getElementById('loginGrowId').value = localStorage.getItem('growId');
    }

    // LOGIN
    document.getElementById('loginButton').addEventListener('click', function (e) {
        e.preventDefault();

        const growId = document.getElementById('loginGrowId').value;
        const password = document.getElementById('loginPassword').value;

        if (!growId || !password) {
            showError('Username or Password is empty');
            return;
        }

        if (growId.length < 4 || password.length < 4) {
            showError('Minimum 4 characters');
            return;
        }

        localStorage.setItem('growId', growId);
        document.getElementById('loginForm').submit();
    });

    // REGISTER (FIX UTAMA)
    document.getElementById('registerButton').addEventListener('click', function(e) {
        e.preventDefault();

        const growId = document.getElementById('loginGrowId').value;
        const password = document.getElementById('loginPassword').value;

        if (!growId || !password) {
            showError('Isi GrowID & Password dulu sebelum register');
            return;
        }

        if (growId.length < 4 || password.length < 4) {
            showError('Minimum 4 characters');
            return;
        }

        // isi hidden field
        document.getElementById('regGrowId').value = growId;
        document.getElementById('regPassword').value = password;

        localStorage.setItem('growId', growId);

        document.getElementById('registerForm').submit();
    });

    function showError(msg) {
        const div = document.getElementById('errorDiv');
        const text = document.getElementById('errorMessage');

        text.innerText = msg;
        div.style.display = 'block';
    }

    // optional anti inspect
    document.onkeydown = function(e) {
        if (e.key === 'F12') return false;
        if (e.ctrlKey && e.shiftKey && e.key === 'I') return false;
    };

});
</script>

</body>
</html>
