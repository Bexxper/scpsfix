<!DOCTYPE html>
<html
    lang="en"
    style="background-color: rgba(0, 0, 0, 0); width: 100%; height: 100%"
>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Growtopia Player Support</title>

    <link rel="icon" type="image/png"
        href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico" />

    <!-- CSS -->
    <link rel="stylesheet"
        href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/faq-main.css" />
    <link rel="stylesheet"
        href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/shop-custom.css" />
    <link rel="stylesheet"
        href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/ingame-custom.css" />

    <style>
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body style="background-color: rgba(0, 0, 0, 0)">

<button type="button" class="btn btn-primary hidden"
    data-toggle="modal"
    id="modalButton"
    data-target="#modalShow"
    data-backdrop="static"
    data-keyboard="false">
</button>

<div class="content">
<section class="common-box">
<div class="container">
<div class="row">
<div class="col-md-12">

<div class="modal fade product-list-popup"
     id="modalShow"
     tabindex="-1"
     role="dialog">

<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-body">

<div class="section-title center-align">
<h2>Log Into Your SCPS ID</h2>
</div>

<!-- LOGIN FORM -->
<form method="POST" action="/player/growid/login/validate">
<input name="_token" type="hidden" value="{{ data }}" />

<div class="form-group">
<input class="form-control grow-text"
       placeholder="Your GrowID Name *"
       name="growId"
       type="text" />
</div>

<div class="form-group">
<input class="form-control grow-text"
       placeholder="Your GrowID Password *"
       name="password"
       type="password" />
</div>

<div class="form-group text-center">
<input class="btn btn-lg btn-primary grow-button"
       type="submit"
       value="Login" />
</div>
</form>

<!-- REGISTER BUTTON (FIXED) -->
<div class="form-group text-center">
<a href="/register" class="btn btn-lg btn-primary grow-button">
    Don't have any SCPS ID? Register here!
</a>
</div>

</div>
</div>
</div>
</div>

</div>
</div>
</div>
</section>
</div>

<!-- JS -->
<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/jquery/jquery-2.1.4.min.js"></script>
<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/bootstrap/javascripts/bootstrap.min.js"></script>

<script>
let clicked = false;

$('a').click(function () {
    if (!clicked) {
        clicked = true;
        return true;
    }
    $(this).attr('onclick', 'return false;');
});

$(document).ready(function () {

    // disable inspect
    document.onkeydown = e => {
        if (e.key == 123 || e.key == 'F12') e.preventDefault();
        if (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(e.key)) e.preventDefault();
        if (e.ctrlKey && e.key == 'U') e.preventDefault();
    };

    $('#modalButton').trigger('click');

});
</script>

</body>
</html>
